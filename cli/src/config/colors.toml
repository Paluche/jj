[colors]
# Format of printed messages.
"error" = { fg = "default", bold = true }
"error heading" = { fg = "red", bold = true }
"error_source" = { fg = "default" }
"error_source heading" = { bold = true }
"warning" = { fg = "default", bold = true }
"warning heading" = { fg = "yellow", bold = true }
"hint" = { fg = "default" }
"hint heading" = { fg = "cyan", bold = true }
"conflict_description" = "yellow"
"conflict_description difficult" = "red"

# Format for the different type of information displayed.
"commit_id" = "blue"
"working_copy commit_id" = "bright blue"

"change_id" = "magenta"
"working_copy change_id" = "bright magenta"

"author" = "yellow"
"working_copy author" = "yellow"

"committer" = "yellow"
# We do not use bright yellow because of how it looks on xterm's default theme.
# https://github.com/jj-vcs/jj/issues/528
"working_copy committer" = "yellow"

"timestamp" = "cyan"
"working_copy timestamp" = "bright cyan"

# Tags color
"tag" = "magenta"
"working_copy tag" = "bright magenta"

"tags" = "magenta"
"working_copy tags" = "bright magenta"

# Bookmark colors
# - Color used for jj Bookmark list
"bookmark" = "magenta"
"working_copy bookmark" = "bright magenta"

# - Remote or local bookmarks
"bookmarks" = "magenta"
"working_copy bookmarks" = "bright magenta"

# - Local bookmarks
"local_bookmarks" = "magenta"
"working_copy local_bookmarks" = "bright magenta"

# - Remote bookmarks
"remote_bookmarks" = "magenta"
"working_copy remote_bookmarks" = "bright magenta"

# Unique prefixes and the rest for change & commit ids
"prefix" = { bold = true }
"rest" = "bright black"
"change_offset" = { bold = true }
"hidden prefix" = "default"

"working_copies" = "green"
"working_copy working_copies" = "bright green"

"workspace_name" = "green"
"git_ref" = "green"
"divergent" = "magenta"
"mutable divergent" = "red"
"mutable divergent change_id" = "red"
"conflict" = "red"
"empty" = "green"
"placeholder" = "red"
"description placeholder" = "yellow"
"empty description placeholder" = "green"
"separator" = "bright black"
"elided" = "bright black"
"root" = "green"

"working_copy" = { bold = true }
"working_copy git_ref" = "bright green"
"working_copy divergent" = "bright magenta"
"working_copy mutable divergent" = "bright red"
"working_copy mutable divergent change_id" = "bright red"
"working_copy conflict" = "bright red"
"working_copy empty" = "bright green"
"working_copy placeholder" = "bright red"
"working_copy description placeholder" = "yellow"
"working_copy empty description placeholder" = "bright green"

"config_list name" = "green"
"config_list value" = "yellow"
"config_list source" = "blue"
"config_list path" = "magenta"
"config_list overridden" = "bright black"
"config_list overridden name" = "bright black"
"config_list overridden value" = "bright black"
"config_list overridden source" = "bright black"
"config_list overridden path" = "bright black"

"diff header" = "yellow"
"diff empty" = "cyan"
"diff binary" = "cyan"
"diff file_header" = { bold = true }
"diff hunk_header" = "cyan"
"diff context line_number" = { dim = true }
"diff removed" = { fg = "red" }
"diff added" = { fg = "green" }
"diff token" = { underline = true }
"diff modified" = "cyan"
"diff untracked" = "magenta"
"diff ignored" = "magenta"
"diff renamed" = "cyan"
"diff copied" = "green"
"diff access-denied" = { bg = "red" }

"operation id" = "blue"
"operation user" = "yellow"
"operation time" = "cyan"
"operation attributes" = "magenta"
"operation current_operation" = { bold = true }
"operation current_operation id" = "bright blue"
"operation current_operation user" = "yellow"                    # No bright yellow, see comment above
"operation current_operation time" = "bright cyan"
"operation current_operation attributes" = "bright magenta"

"node elided" = { fg = "bright black" }
"node working_copy" = { fg = "green", bold = true }
"node current_operation" = { fg = "green", bold = true }
"node immutable" = { fg = "bright cyan", bold = true }
"node conflicted" = { fg = "red", bold = true }

"signature display" = "yellow"
"signature key" = "cyan"
"signature status good" = "green"
"signature status unknown" = "yellow"
"signature status bad" = "red"
"signature status invalid" = "red"

"arrange context commit" = { dim = true }
